<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#141423"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </radialGradient>

    <!-- Outer Ring Gold Gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5c518"/>
      <stop offset="50%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>

    <!-- Neon Glow Accents -->
    <linearGradient id="neonGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00b4d8"/>
      <stop offset="50%" stop-color="#7b2fff"/>
      <stop offset="100%" stop-color="#f5c518"/>
    </linearGradient>

    <!-- Shadow / Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Canvas -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)"/>

  <!-- Outer Neon Glow Ring -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="url(#neonGlow)" stroke-width="4" opacity="0.4" filter="url(#glow)"/>
  
  <!-- Outer Gold Ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="url(#goldGrad)" stroke-width="8" stroke-dasharray="10 15 30 15" filter="url(#glow)"/>

  <!-- Stylized CineSphere Letter "C" -->
  <g transform="translate(146, 126)" filter="url(#glow)">
    <!-- Main Backing Glow -->
    <path d="M 180 50 
             C 100 50, 40 100, 40 180 
             C 40 260, 100 310, 180 310 
             C 210 310, 230 300, 240 290 
             L 240 230 
             C 220 245, 200 250, 180 250 
             C 130 250, 100 220, 100 180 
             C 100 140, 130 110, 180 110 
             C 200 110, 220 115, 240 130 
             L 240 70 
             C 230 60, 210 50, 180 50 Z" 
          fill="url(#goldGrad)"/>

    <!-- Inner Filmstrip Play Button Accent -->
    <polygon points="150,140 150,220 210,180" fill="#00b4d8"/>
  </g>
</svg>
